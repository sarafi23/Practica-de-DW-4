<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio - Practica4</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Bienvenido a Practica4</h1>

    <div id="authForms">
      <div class="card" id="loginForm">
        <h2>Iniciar Sesión</h2>
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Contraseña" />
        <button onclick="login()">Entrar</button>
        <p class="error" id="loginError"></p>
        <hr />
        <a href="http://localhost:5000/api/auth/google" class="btn-google">Iniciar con Google</a>
        <p class="switch">¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate</a></p>
      </div>

      <div class="card" id="registerForm" style="display:none">
        <h2>Registrarse</h2>
        <input type="text" id="regNombre" placeholder="Nombre completo" />
        <input type="email" id="regEmail" placeholder="Email" />
        <input type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)" />
        <button onclick="register()">Crear cuenta</button>
        <p class="error" id="regError"></p>
        <p class="switch">¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Inicia sesión</a></p>
      </div>
    </div>

    <div id="perfilInfo" style="display:none">
      <div class="card">
        <h2>Perfil</h2>
        <p><strong>Nombre:</strong> <span id="perfilNombre"></span></p>
        <p><strong>Email:</strong> <span id="perfilEmail"></span></p>
        <button onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
